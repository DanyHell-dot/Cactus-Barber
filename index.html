        // --- LÓGICA DE FIREBASE (REAL-TIME) ---
        
        // Escuchar barberos en la base de datos (para llenarlos en el form)
        function iniciarEscuchaBarberos() {
            const selectCitas = document.getElementById('barbero');
            if(!db) {
                selectCitas.innerHTML = '<option value="" disabled selected>Error de conexión</option>';
                return;
            }
            
            db.collection("barberos").onSnapshot((snapshot) => {
                estadoApp.barberos = [];
                snapshot.forEach(doc => {
                    estadoApp.barberos.push({ id: doc.id, nombre: doc.data().nombre });
                });
                
                // Si la colección está vacía por ser nueva, inyectamos los defaults automáticamente
                if (estadoApp.barberos.length === 0) {
                    db.collection("barberos").add({ nombre: "TONNY" });
                    db.collection("barberos").add({ nombre: "DUDE" });
                }

                renderizarListaBarberos();
                cargarHorarios();
            }, (error) => {
                console.error("Error de permisos en barberos: ", error);
                selectCitas.innerHTML = '<option value="" disabled selected>Bloqueado por seguridad</option>';
                mostrarMensaje("Error al cargar barberos: Revisa las reglas de Firestore");
            });
        }
